name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Get version
        id: package-version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build React and Electron
        # electron-builder'ı build modunda çalıştırıyoruz, release'i aşağıda biz yöneteceğiz
        run: npm run electron:build 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Create GitHub Release
        # Hem v* tag'lerinde hem de main branch push'larında çalışır
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package-version.outputs.version }}
          name: Sürüm v${{ steps.package-version.outputs.version }}
          files: |
            dist_electron/*.exe
            dist_electron/latest.yml
            dist_electron/*.blockmap
          draft: false
          prerelease: false
          body: |
            ## 🆕 Yenice Barkod Sistemi v${{ steps.package-version.outputs.version }}
            Bu sürüm GitHub Actions tarafından otomatik olarak derlenmiş ve yayınlanmıştır.
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: dist_electron/
          retention-days: 7
