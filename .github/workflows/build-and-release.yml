name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "=== Installing dependencies ==="
          npm install
          echo "=== Listing node_modules ==="
          Get-ChildItem node_modules -Directory | Select-Object -First 20
          echo "=== package-lock.json status ==="
          if (Test-Path package-lock.json) { 
            Write-Host "✓ package-lock.json exists"
          } else {
            Write-Host "✗ package-lock.json missing"
          }

      - name: Build React app
        run: |
          echo "Building React application..."
          npm run build
          echo "React build completed"

      - name: Check build output
        run: |
          echo "Checking dist folder..."
          dir dist
          echo "Checking for main.cjs..."
          dir main.cjs

      - name: Build Electron app
        run: |
          echo "Building Electron application..."
          npm run electron:build
          echo "Electron build completed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check build artifacts
        run: |
          echo "Listing build artifacts..."
          dir dist_electron
          Get-ChildItem -Path "dist_electron" -Recurse -Include "*.exe" | ForEach-Object { Write-Host $_.FullName }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: dist_electron/**/*.exe
          draft: false
          prerelease: false
          body: |
            ## 🆕 Yeni Özellikler

            ✨ Hesap Makinesi Eklendi
            🔄 GitHub Actions Entegrasyonu
            🔧 Ayarlar Menüsüne Güncelleme Kontrol

            ## 🐛 Hata Düzeltmeleri

            ✅ İndentasyon Hatası Düzeltildi
            ✅ Operatör Tuşu Mantığı İyileştirildi

            ## 📦 Kurulum

            En son `.exe` dosyasını indir ve çalıştır.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist_electron/
            dist/
          retention-days: 30
