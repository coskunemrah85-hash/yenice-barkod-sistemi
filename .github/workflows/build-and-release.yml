name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React
        run: npm run build

      - name: Build and publish with Electron Builder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:publish

      - name: Create Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🆕 Yeni Özellikler

            ✨ Hesap Makinesi Eklendi
            🔄 GitHub Actions Entegrasyonu Kuruldu
            🔧 Ayarlar Menüsüne Güncelleme Kontrol Sistemi

            ## 🐛 Hata Düzeltmeleri

            ✅ İndentasyon Hatası Düzeltildi
            ✅ Operatör Tuşu Mantığı İyileştirildi

            ## 📦 Kurulum

            En son `.exe` dosyasını indir ve çalıştır.
          draft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-app
          path: dist_electron/
          retention-days: 30
