name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install --save-dev electron electron-builder electron-updater

      - name: Build React app
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Build Electron app with auto-update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:build

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist_electron/**/*.exe
          draft: false
          prerelease: false
          body: |
            ## 🆕 Yeni Özellikler

            ✨ Hesap Makinesi Eklendi
            🔄 GitHub Actions Entegrasyonu Kuruldu
            🔧 Ayarlar Menüsüne Güncelleme Kontrol Sistemi

            ## 🐛 Hata Düzeltmeleri

            ✅ İndentasyon Hatası Düzeltildi
            ✅ Operatör Tuşu Mantığı İyileştirildi

            ## 📦 Kurulum

            En son `.exe` dosyasını indir ve çalıştır.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist_electron/
            dist/
          retention-days: 30
