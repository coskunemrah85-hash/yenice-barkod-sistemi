name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node 18 yerine daha güncel olan 20'ye geçtik
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Build Electron app
        run: npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        # Sadece v ile başlayan tag'ler pushlandığında çalışır
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # KRİTİK DEĞİŞİKLİK: latest.yml ve blockmap dosyalarını da ekliyoruz
          files: |
            dist_electron/*.exe
            dist_electron/*.yml
            dist_electron/*.blockmap
          draft: false
          prerelease: false
          body: |
            ## 🆕 Yenice Barkod Sistemi v1.0.8
            
            ### Özellikler:
            ✨ Hesap Makinesi Entegrasyonu
            🔄 Otomatik Güncelleme Sistemi İyileştirmeleri
            🔧 Ayarlar Menüsü Güncelleme Kontrolü
            
            ### Hata Düzeltmeleri:
            ✅ İndentasyon ve Operatör hataları giderildi.
            
            **Not:** Güncelleme hatası alan kullanıcıların bu sürümü manuel kurması önerilir.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            dist_electron/
            dist/
          retention-days: 7