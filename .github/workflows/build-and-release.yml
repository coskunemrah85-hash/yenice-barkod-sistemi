name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'


jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Daha kararlı olan Node 20'ye geri dönüldü
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps # Bağımlılık çakışmalarını önlemek için

      - name: Build React and Electron
        # electron-builder'ı publish modunda değil, sadece build modunda çalıştırıyoruz
        run: npm run electron:build 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        # Sadece v ile başlayan tag'ler pushlandığında çalışır
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_electron/*.exe
            dist_electron/latest.yml
            dist_electron/*.blockmap
          draft: false
          prerelease: false
          body: |
            ## 🆕 Yenice Barkod Sistemi
            Bu sürüm GitHub Actions tarafından otomatik olarak oluşturulmuştur.
          generate_release_notes: true # Notları otomatik oluşturur
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: dist_electron/
          retention-days: 7
